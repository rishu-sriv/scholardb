<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScholarDB — Phase 4 echo test</title>
  <style>
    body        { font-family: monospace; max-width: 640px; margin: 40px auto; background: #111; color: #eee; }
    h1          { font-size: 1.1rem; color: #aaa; margin-bottom: 24px; }
    #status     { margin-bottom: 16px; }
    .dot        { display: inline-block; width: 10px; height: 10px; border-radius: 50%;
                  background: #555; margin-right: 8px; }
    .dot.open   { background: #4c4; }
    .dot.closed { background: #c44; }
    button      { font-family: monospace; padding: 6px 14px; margin-right: 8px;
                  background: #222; color: #eee; border: 1px solid #555; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: default; }
    #log        { margin-top: 20px; background: #1a1a1a; border: 1px solid #333;
                  padding: 12px; height: 260px; overflow-y: auto; }
    .row        { margin: 3px 0; }
    .row.sent   { color: #7af; }
    .row.recv   { color: #4c4; }
    .row.info   { color: #aaa; }
    .row.err    { color: #f66; }
  </style>
</head>
<body>

<h1>ScholarDB — WebSocket echo test (Phase 4)</h1>

<div id="status">
  <span class="dot" id="dot"></span>
  <span id="status-text">Disconnected</span>
</div>

<button id="btn-connect">Connect</button>
<button id="btn-send" disabled>Send test message</button>
<button id="btn-disconnect" disabled>Disconnect</button>

<div id="log"></div>

<script>
  const SERVER = 'ws://localhost:8080';

  const dot        = document.getElementById('dot');
  const statusText = document.getElementById('status-text');
  const btnConnect = document.getElementById('btn-connect');
  const btnSend    = document.getElementById('btn-send');
  const btnDisc    = document.getElementById('btn-disconnect');
  const log        = document.getElementById('log');

  let ws = null;
  let msgCount = 0;

  function appendLog(text, cls) {
    const row = document.createElement('div');
    row.className = 'row ' + cls;
    row.textContent = text;
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
  }

  function setConnected(open) {
    dot.className       = 'dot ' + (open ? 'open' : 'closed');
    statusText.textContent = open ? 'Connected to ' + SERVER : 'Disconnected';
    btnConnect.disabled  = open;
    btnSend.disabled     = !open;
    btnDisc.disabled     = !open;
  }

  btnConnect.addEventListener('click', () => {
    appendLog('Connecting to ' + SERVER + ' …', 'info');
    ws = new WebSocket(SERVER);

    ws.onopen = () => {
      setConnected(true);
      appendLog('Connection established.', 'info');
    };

    ws.onmessage = (event) => {
      appendLog('← echo: ' + event.data, 'recv');
    };

    ws.onerror = () => {
      appendLog('WebSocket error — is the server running?', 'err');
    };

    ws.onclose = () => {
      setConnected(false);
      appendLog('Connection closed.', 'info');
      ws = null;
    };
  });

  btnSend.addEventListener('click', () => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const msg = 'hello from browser #' + (++msgCount);
    ws.send(msg);
    appendLog('→ sent: ' + msg, 'sent');
  });

  btnDisc.addEventListener('click', () => {
    if (ws) ws.close();
  });
</script>

</body>
</html>
